name: Backend CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      # ── Static tests (no server needed) ───────────────────────────────────

      - name: Static — architecture structure
        run: python scripts/tests/test_architecture_structure.py

      - name: Static — import graph
        run: python scripts/tests/test_import_graph.py

      # ── Start backend (SQLite, no Postgres required) ───────────────────────

      - name: Start backend in background
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
        run: uvicorn main:app --host 127.0.0.1 --port 8000 &

      - name: Wait for backend /health
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "Backend is ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/15 — not ready yet, sleeping 2s"
            sleep 2
          done
          echo "ERROR: backend did not become ready within 30s"
          exit 1

      # ── API integration tests ──────────────────────────────────────────────

      - name: API — auth JWT
        run: python scripts/tests/test_auth_jwt.py --base-url http://127.0.0.1:8000

      - name: API — user isolation
        run: python scripts/tests/test_user_isolation.py --base-url http://127.0.0.1:8000

      - name: API — request ID header
        run: python scripts/tests/test_request_id_header.py --base-url http://127.0.0.1:8000

      - name: API — standardized errors
        run: python scripts/tests/test_standardized_errors.py --base-url http://127.0.0.1:8000

      - name: API — summary verification (end-to-end)
        run: python scripts/tests/test_summary_verification.py --base-url http://127.0.0.1:8000

      - name: API — campaign CRUD + isolation
        run: python scripts/tests/test_campaign_crud.py --base-url http://127.0.0.1:8000

      - name: API — campaign lead assignment + isolation
        run: python scripts/tests/test_campaign_lead_assignment.py --base-url http://127.0.0.1:8000

      - name: API — campaign execution engine
        run: python scripts/tests/test_campaign_execution.py --base-url http://127.0.0.1:8000

      - name: API — lead scoring determinism
        run: python scripts/tests/test_lead_scoring.py --base-url http://127.0.0.1:8000
